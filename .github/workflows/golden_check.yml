name: Golden File Check

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if PR modifies golden tests
        id: check_goldens
        run: |
          # NOTE: piping into `head` would mask grep's exit status (head always
          # exits 0 even on empty input), causing the `if` to always succeed and
          # modifies_goldens to always be 'true'. Use `grep -q` so the exit
          # status of grep itself drives the branch.
          changed_files=$(git diff origin/main...HEAD --name-only)
          if echo "$changed_files" | grep -qE "test_.*golden|golden.*test|snapshot.*test|expected_.*\.json"; then
            echo "modifies_goldens=true" >> $GITHUB_OUTPUT
            echo "Detected golden file modifications:"
            echo "$changed_files" | grep -E "test_.*golden|golden.*test|snapshot.*test|expected_.*\.json" | head -5
          else
            echo "modifies_goldens=false" >> $GITHUB_OUTPUT
            echo "No golden file modifications detected."
          fi

      - name: Require [regen-goldens] tag in commit message
        if: steps.check_goldens.outputs.modifies_goldens == 'true'
        run: |
          if git log origin/main..HEAD --pretty=format:"%s%n%b" | grep -qE "\[regen-goldens?\]"; then
            echo "[OK] [regen-goldens] tag found"
          else
            echo "[FAIL] Golden files modified but no [regen-goldens] tag in any commit message"
            echo "If you intend to regenerate goldens, add [regen-goldens] to a commit message."
            exit 1
          fi
