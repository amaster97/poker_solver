name: Lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  rust:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      # PyO3 build-script reads the system Python and refuses to build if
      # it's newer than its supported max (PyO3 0.23 caps at 3.13). macos-14
      # runners ship Python 3.14 as the default, so pin to 3.13 before
      # running clippy (which has to compile pyo3-ffi's build script).
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      # Forward-compat ABI3 fallback in case a future runner upgrade outpaces
      # PyO3 again. Safe with stable ABI builds.
      - name: Clippy (informational on first baseline)
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: '1'
        # First-run lint baseline: existing code has clippy warnings that
        # haven't been swept yet. Keep informational until a follow-up PR
        # cleans the baseline, then flip back to gating.
        continue-on-error: true
        run: cargo clippy --all-targets -- -D warnings
      - name: rustfmt
        run: cargo fmt --check

  python:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install ruff black
      - name: ruff (informational on first baseline)
        # Existing tree has UP037 / I001 / F841 hits. Informational until
        # the cleanup PR lands, then re-gate.
        continue-on-error: true
        run: ruff check poker_solver/ tests/
      - name: black (informational on first baseline)
        continue-on-error: true
        run: black --check poker_solver/ tests/
