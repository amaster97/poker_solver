[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "poker_solver"
version = "0.1.0"
description = "Texas Hold'em equity solver: hand evaluation, Monte Carlo equity, range parsing"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [{ name = "ashen" }]
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Topic :: Games/Entertainment",
]
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=7.0"]

[project.scripts]
poker-solver = "poker_solver.cli:main"

[tool.setuptools.packages.find]
include = ["poker_solver*"]
exclude = ["tests*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
